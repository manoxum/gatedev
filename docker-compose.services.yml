include:
  - docker-compose.infra.yml

services:
  migration:
    image: ${DOCKERHUB:-brainsoftstp}/private:bindnet-migration-${STAGE:-main}-${VERSION:-latest}
    restart: "no"
    environment:
      TZ: ${TZ:-Africa/Sao_Tome}
      DATABASE_URL: postgres://${POSTGRES_USER:-bindnet}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bindnet}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy

  dns-provider:
    image: ${DOCKERHUB:-brainsoftstp}/private:bindnet-dns-provider-${STAGE:-main}-${VERSION:-latest}
    restart: unless-stopped
    network_mode: host
    env_file:
      - ${BINDNET_ENV_FILE:-.env.main}
    environment:
      POSTGRES_HOST: 10.91.0.10
      REDIS_HOST: 10.91.0.11
      NGINX_CONFIG_PATH: /nginx-config
      DISCOVER_PORT: ${DISCOVER_PORT:-8531}
    volumes:
      - nginx_config:/nginx-config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully

  hotspot:
    image: ${DOCKERHUB:-brainsoftstp}/private:bindnet-hotspot-${STAGE:-main}-${VERSION:-latest}
    restart: unless-stopped
    privileged: true
    network_mode: host
    # force_stop_create_ap (entrypoint.sh) pode levar ate ~15s no pior
    # caso (timeout -k 5 10 do "create_ap --stop" + escalonamento pra
    # SIGKILL) antes de devolver a placa fisica - sem isso aqui, o
    # Docker usa o padrao de 10s e manda SIGKILL no container inteiro
    # antes dessa limpeza terminar (ex.: durante um "docker compose up
    # --build" que recria o container com o hotspot ativo), deixando o
    # driver iwlwifi num estado que ja disparou bloqueio de rfkill de
    # verdade (rfkill list mostrando "Hard blocked: yes" em phy0) numa
    # sessao real. 30s da folga confortavel acima do pior caso.
    stop_grace_period: 30s
    env_file:
      - ${BINDNET_ENV_FILE:-.env.main}
    environment:
      POSTGRES_HOST: 10.91.0.10
      POSTGRES_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully

  worker:
    image: ${DOCKERHUB:-brainsoftstp}/private:bindnet-worker-${STAGE:-main}-${VERSION:-latest}
    restart: unless-stopped
    privileged: true
    network_mode: host
    env_file:
      - ${BINDNET_ENV_FILE:-.env.main}
    environment:
      BINDNET_ENV_PATH: /workspace/${BINDNET_ENV_FILE:-.env.main}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /run/dbus:/run/dbus
      - /etc/NetworkManager/conf.d:/etc/NetworkManager/conf.d
      - /usr/local/share/ca-certificates:/usr/local/share/ca-certificates
      - /etc/ssl/certs:/etc/ssl/certs
      # /home de todos os usuarios do host - usado so por
      # /api/certificates/ca/install-local para importar a CA local nas
      # stores NSS proprias do Chrome/Chromium (~/.pki/nssdb) e do
      # Firefox (~/.mozilla/firefox/*) de cada usuario, que nao leem
      # /usr/local/share/ca-certificates. Sem isso a CA fica instalada
      # no sistema mas o navegador continua nao confiando nela.
      - /home:/hosthome
      - worker_ipc:/run/bindnet-admin
      - ./:/workspace

  backend:
    image: ${DOCKERHUB:-brainsoftstp}/private:bindnet-backend-${STAGE:-main}-${VERSION:-latest}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Africa/Sao_Tome}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      BACKEND_PORT: ${BACKEND_PORT:-8090}
      POSTGRES_USER: ${POSTGRES_USER:-bindnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bindnet}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      MONGO_USER: ${MONGO_USER:-bindnet}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB:-bindnet}
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      HOTSPOT_CREDIT_TRACE_RETENTION_DAYS: ${HOTSPOT_CREDIT_TRACE_RETENTION_DAYS:-180}
      MINIO_HOST: minio
      MINIO_PORT: "9000"
      BINDNET_OUI_DB_PATH: ${BINDNET_OUI_DB_PATH:-/usr/local/share/bindnet/oui.csv}
      NGINX_UI_URL: ${NGINX_UI_URL:-http://nginx-ui:9000}
      # Porta do endpoint de descoberta, so para o painel exibir/montar o
      # endereco deste no (GET /api/dns/node) - quem escuta nela e o
      # dns-provider, nao o backend.
      DISCOVER_PORT: ${DISCOVER_PORT:-8531}
      # CA_COMMON_NAME e NGINX_UI_USERNAME/PASSWORD nao aparecem aqui de
      # proposito: sao editados no painel (Configuracoes) e vivem na tabela
      # panel_config. settings.ImportFromEnv continua no codigo so para
      # migrar instalacoes que ainda tenham esses valores no ambiente.
    expose:
      - "8090"
    ports:
      - "${BACKEND_PORT:-8090}:8090"
    volumes:
      - admin_data:/data
      - cert_proxy_data:/certproxy-data:ro
      - nginx_ui_data:/nginx-ui-data
      - nginx_config:/nginx-config
      - worker_ipc:/run/bindnet-admin
    depends_on:
      worker:
        condition: service_started
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      migration:
        condition: service_completed_successfully
    networks:
      - proxy

  frontend:
    image: ${DOCKERHUB:-brainsoftstp}/private:bindnet-frontend-${STAGE:-main}-${VERSION:-latest}
    restart: unless-stopped
    # network_mode: host (em vez de publicar a porta na rede "proxy") -
    # necessario para que o nginx enxergue o IP real do dispositivo
    # conectado ao hotspot. Publicar via "ports:" numa rede bridge passa
    # pelo docker-proxy (userland proxy), que reabre a conexao a partir
    # do gateway da bridge e descarta o IP de origem - isso quebra a
    # identificacao do dispositivo por IP em GET /api/hotspot/portal/me
    # (ver resolvePortalMAC em services/backend/hotspot_portal.go).
    network_mode: host
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-9090}
      BACKEND_PORT: ${BACKEND_PORT:-8090}
    depends_on:
      - backend

networks:
  proxy:
    driver: bridge
    ipam:
      config:
        - subnet: 10.91.0.0/24

volumes:
  nginx_config:
  nginx_ui_data:
  cert_proxy_data:
  admin_data:
  worker_ipc:
