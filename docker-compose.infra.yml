services:
  nginx-ui:
    image: uozi/nginx-ui:v2.4.0
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Africa/Sao_Tome}
      NGINX_UI_IGNORE_DOCKER_SOCKET: "true"
    ports:
      - "${NGINX_UI_PORT:-9080}:9000"
      - "443:443"
      - "80:80"
    expose:
      - "9000"
    volumes:
      - nginx_config:/etc/nginx
      - nginx_ui_data:/etc/nginx-ui
      - www_data:/var/www

    networks:
      proxy:
      wnet:
        aliases:
          - "${STAGE:-main}.nginx-ui.bindnet.wnet"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Africa/Sao_Tome}
      POSTGRES_USER: ${POSTGRES_USER:-bindnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bindnet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-9054}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bindnet} -d ${POSTGRES_DB:-bindnet}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      dbnet:
        aliases:
          - "${STAGE:-main}.postgres.bindnet.dbnet"
      proxy:
        ipv4_address: 10.91.0.10

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Africa/Sao_Tome}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-bindnet}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-bindnet}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      proxy:
      dbnet: 
        aliases:
          - "${STAGE:-main}.mongo.bindnet.dbnet"

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      TZ: ${TZ:-Africa/Sao_Tome}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    networks:
      - proxy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      proxy:
        ipv4_address: 10.91.0.11

networks:
  proxy:
    driver: bridge
    ipam:
      config:
        - subnet: 10.91.0.0/24
  wnet:
    external: true    
  dbnet:
    external: true

volumes:
  nginx_config:
  nginx_ui_data:
  www_data:
  cert_proxy_data:
  postgres_data:
  mongo_data:
  mongo_config:
  minio_data:
  redis_data:
