services:
  nginx-ui:
    image: uozi/nginx-ui:v2.3.11
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Africa/Sao_Tome}
      # O docker.sock fica exclusivamente no worker. O nginx-ui pode
      # administrar os arquivos de Nginx sem controlar containers Docker.
      NGINX_UI_IGNORE_DOCKER_SOCKET: "true"
    ports:
      # Porta administrativa direta. Unica forma de acesso ao nginx-ui -
      # nao ha mais proxy publico nas portas 80/443 (cert-proxy removido;
      # gestao de certificados agora e feita pelo painel, ver services/backend).
      - "9080:9000"
    volumes:
      - nginx_config:/etc/nginx
      - nginx_ui_data:/etc/nginx-ui
      - www_data:/var/www
    networks:
      - proxy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Africa/Sao_Tome}
      POSTGRES_USER: ${POSTGRES_USER:-bindnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bindnet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bindnet} -d ${POSTGRES_DB:-bindnet}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      proxy:
        # IP fixo: dns-provider (network_mode:host) fala com o Postgres
        # por IP direto, ja que nao enxerga a DNS interna do Docker.
        ipv4_address: 10.91.0.10

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Africa/Sao_Tome}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-bindnet}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-bindnet}
    volumes:
      - mongo_data:/data/db
    networks:
      - proxy

  minio:
    image: minio/minio
    restart: unless-stopped
    # Provisionado para uso futuro de armazenamento de arquivos - nenhum
    # servico usa isso hoje (ver RULE.md).
    command: server /data --console-address ":9001"
    environment:
      TZ: ${TZ:-Africa/Sao_Tome}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - proxy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Cache para o dns-provider (mapeamento hostname -> IP de loopback);
    # hidratado a partir do Postgres na inicializacao do dns-provider,
    # nunca a fonte de verdade - perder este volume nao perde dados,
    # so custa uma rehidratacao no proximo boot do dns-provider.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      proxy:
        # IP fixo: dns-provider (network_mode:host) fala com o Redis por
        # IP direto, ja que nao enxerga a DNS interna do Docker.
        ipv4_address: 10.91.0.11

  migration:
    build:
      context: ./services/migration
    image: bindnet/db-migration:local
    # Job one-shot: aplica "prisma migrate deploy" no Postgres e encerra -
    # nunca fica de pe como servidor, por isso nao reinicia sozinho.
    restart: "no"
    environment:
      TZ: ${TZ:-Africa/Sao_Tome}
      DATABASE_URL: postgres://${POSTGRES_USER:-bindnet}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bindnet}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy

  dns-provider:
    build:
      context: ./services/worker/dns
    image: bindnet/dns-provider:local
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      # network_mode:host nao enxerga a DNS interna do Docker - por isso
      # aponta para os IPs fixos do Postgres/Redis na rede "proxy" (ver
      # bloco "networks" no fim deste arquivo) em vez do nome do servico.
      POSTGRES_HOST: 10.91.0.10
      REDIS_HOST: 10.91.0.11
    depends_on:
      hotspot:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully


  hotspot:
    build:
      context: ./services/worker/hotspot
    image: bindnet/create-ap-hotspot:local
    restart: unless-stopped
    privileged: true
    network_mode: host
    env_file:
      - .env

  worker:
    build:
      context: ./services/worker/controller
    image: bindnet/admin-worker:local
    restart: unless-stopped
    # Unico servico com acesso privilegiado ao host: controla os demais
    # containers (docker.sock), o NetworkManager (dbus + conf.d) e le as
    # interfaces reais da maquina (network_mode: host). Nunca expoe porta
    # TCP - o backend fala com ele via socket Unix (worker_ipc).
    network_mode: host
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /run/dbus:/run/dbus
      - /etc/NetworkManager/conf.d:/etc/NetworkManager/conf.d
      - worker_ipc:/run/bindnet-admin
      - ./:/workspace

  backend:
    build:
      context: ./services/backend
    image: bindnet/admin-backend:local
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Africa/Sao_Tome}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      BACKEND_PORT: ${BACKEND_PORT:-8090}
      POSTGRES_USER: ${POSTGRES_USER:-bindnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bindnet}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      MONGO_USER: ${MONGO_USER:-bindnet}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB:-bindnet}
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      CA_COMMON_NAME: ${CA_COMMON_NAME:-Bindnet Local Development CA}
    ports:
      - "${BACKEND_PORT:-8090}:8090"
    volumes:
      - admin_data:/data
      # Volume legado do antigo cert-proxy, montado so leitura: usado uma
      # unica vez por carregarOuImportarCA para importar a CA existente
      # (preserva a confianca ja estabelecida nos dispositivos do usuario).
      # Nunca escrito pelo backend.
      - cert_proxy_data:/certproxy-data:ro
      # So leitura: le o segredo de instalacao do nginx-ui (arquivo oculto
      # gerado no primeiro boot) para exibir no painel - nunca escreve
      # nesse volume, quem administra o nginx-ui e o proprio nginx-ui.
      - nginx_ui_data:/nginx-ui-data:ro
      - worker_ipc:/run/bindnet-admin
    depends_on:
      worker:
        condition: service_started
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
      migration:
        condition: service_completed_successfully
    networks:
      - proxy

  frontend:
    build:
      context: ./services/frontend
    image: bindnet/admin-frontend:local
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-9090}:80"
    depends_on:
      - backend
    networks:
      - proxy

networks:
  proxy:
    driver: bridge
    # Subnet fixa (nao confundir com DOCKER_CONTAINER_CIDR do .env, que
    # documenta a bridge PADRAO do Docker) - precisa ser previsivel porque
    # o dns-provider roda em network_mode:host (nao enxerga a DNS interna
    # do Docker para resolver "postgres"/"redis" pelo nome) e por isso
    # fala com eles pelo IP fixo abaixo em vez de pelo nome do servico.
    ipam:
      config:
        - subnet: 10.91.0.0/24

volumes:
  # Volumes gerenciados pelo Docker Compose: o Compose cria
  # automaticamente se nao existirem e reaproveita enquanto o projeto for
  # o mesmo. Nao use "docker compose down -v" neste stack.
  nginx_config:
  nginx_ui_data:
  www_data:
  cert_proxy_data:
    # Volume legado do antigo cert-proxy (removido). Mantido apenas para
    # o backend importar a CA existente uma unica vez (loadOrImportCA);
    # NAO apagar - contem a CA ja confiada nos dispositivos do usuario.
  admin_data:
  postgres_data:
    # Banco de dados principal do stack. Guarda, entre outras coisas, a
    # chave privada da CA local de gestao de certificados (tabela "ca",
    # coluna private_key_pem) - NUNCA apagar/recriar este volume sem
    # entender que isso invalida a CA e todos os certificados ja
    # confiados nos dispositivos do usuario (mesmo risco que o antigo
    # cert_proxy_data). Sem "external: true", "docker compose down -v"
    # AGORA apaga este volume - nunca rode "down -v" neste stack.
  mongo_data:
  minio_data:
  redis_data:
  worker_ipc:
    # Guarda so o socket Unix efemero de IPC entre backend e worker -
    # ao contrario dos volumes acima, nao precisa sobreviver a um
    # "docker compose down": e recriado a cada subida.
